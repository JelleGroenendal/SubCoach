<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="Real-time substitution management for team sport coaches"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="SubCoach" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>SubCoach</title>
    <!-- Apply theme immediately to prevent flash of wrong theme -->
    <script>
      (function () {
        var theme = localStorage.getItem("subcoach-theme");
        if (theme === "light") {
          // Light mode - do nothing, CSS default is light
        } else {
          // Dark mode (default)
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

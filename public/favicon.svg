<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- SC text - clean, bold, modern -->
  <text x="50" y="67" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="44" 
        font-weight="800" 
        fill="white" 
        text-anchor="middle"
        letter-spacing="-2">SC</text>
  
  <!-- Subtle substitution arrows accent -->
  <g opacity="0.85" fill="white">
    <path d="M20 80 L30 80 L27 77 M27 83 L30 80" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M80 80 L70 80 L73 77 M73 83 L70 80" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
